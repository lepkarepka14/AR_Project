<!DOCTYPE html>
<html>
  <head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>AR_Project - Базовый AR с распознаванием пола</title>
    <script src="https://aframe.io/releases/1.4.2/aframe.min.js"></script>
    <script src="https://cdn.jsdelivr.net/gh/c-frame/aframe-extras@7.0.0/dist/aframe-extras.min.js"></script>
    
    <script>
      AFRAME.registerComponent('ar-placement', {
        init: function () {
          const reticle = document.getElementById('reticle');
          const modelGroup = document.getElementById('model-group');

          // Событие 'select' срабатывает при тапе по экрану в WebXR (AR-режиме)
          this.el.sceneEl.addEventListener('select', () => {
            // Если прицел виден (пол найден), ставим модель на его место
            if (reticle.getAttribute('visible')) {
              const position = reticle.getAttribute('position');
              modelGroup.setAttribute('position', position);
              modelGroup.setAttribute('visible', 'true');
            }
          });
        }
      });
    </script>
  </head>
  <body>
    <a-scene 
      webxr="optionalFeatures: hit-test, local-floor;"
      ar-mode-ui="enabled: true" 
      vr-mode-ui="enabled: false" 
      renderer="colorManagement: true;"
      ar-placement>
      
      <a-assets>
        <a-asset-item id="test-model" src="model.glb"></a-asset-item>
      </a-assets>

      <a-camera position="0 1.6 0"></a-camera>

      <a-entity id="reticle" 
                geometry="primitive: ring; radiusInner: 0.15; radiusOuter: 0.2" 
                material="color: #00FF00; shader: flat" 
                rotation="-90 0 0" 
                ar-hit-test>
      </a-entity>

      <a-entity id="model-group" visible="false">
        <a-gltf-model src="#test-model" scale="1 1 1" animation-mixer></a-gltf-model>
      </a-entity>

    </a-scene>
  </body>
</html>
