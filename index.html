<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AR Просмотр Модели</title>
    
    <script type="module" src="https://ajax.googleapis.com/ajax/libs/model-viewer/3.4.0/model-viewer.min.js"></script>
    
    <style>
        body {
            margin: 0;
            padding: 0;
            width: 100vw;
            height: 100vh;
            background-color: #f4f4f4;
            font-family: sans-serif;
        }
        
        /* Растягиваем viewer на весь экран */
        model-viewer {
            width: 100%;
            height: 100%;
        }

        /* Стили для кнопки запуска AR */
        .ar-button {
            background-color: #007bff;
            color: white;
            border-radius: 8px;
            border: none;
            position: absolute;
            bottom: 32px;
            left: 50%;
            transform: translateX(-50%);
            padding: 12px 24px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }
    </style>
</head>
<body>

    <model-viewer 
        src="model.glb" 
        ar 
        ar-modes="webxr scene-viewer quick-look" 
        ar-placement="floor" 
        autoplay 
        camera-controls 
        shadow-intensity="1">
        
        <button slot="ar-button" class="ar-button">
            Открыть в AR (Наведи на пол)
        </button>
        
    </model-viewer>

</body>
</html>
