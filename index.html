<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
  <title>AR Viewer</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #0a0a0f;
      font-family: -apple-system, BlinkMacSystemFont, sans-serif;
      overflow: hidden;
      height: 100dvh;
      width: 100vw;
      color: #fff;
    }
    #overlay {
      position: fixed;
      inset: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 28px;
      z-index: 100;
      transition: opacity 0.4s;
    }
    #overlay.hidden { opacity: 0; pointer-events: none; }
    .icon { font-size: 60px; margin-bottom: 20px; }
    h1 { font-size: 24px; font-weight: 700; margin-bottom: 10px; text-align: center; }
    .sub {
      font-size: 14px; color: rgba(255,255,255,0.5);
      text-align: center; max-width: 280px; line-height: 1.6; margin-bottom: 32px;
    }
    .btn {
      display: block; width: 100%; max-width: 300px;
      padding: 16px; border-radius: 14px; border: none;
      font-size: 16px; font-weight: 600; cursor: pointer;
      margin-bottom: 12px; -webkit-tap-highlight-color: transparent;
      transition: opacity 0.15s; text-align: center;
    }
    .btn:active { opacity: 0.7; }
    .btn-primary { background: #3b82f6; color: #fff; }
    .btn-secondary {
      background: rgba(255,255,255,0.07); color: rgba(255,255,255,0.8);
      border: 1px solid rgba(255,255,255,0.12) !important;
    }
    #diag-box {
      width: 100%; max-width: 300px;
      background: rgba(255,255,255,0.05);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 12px; padding: 14px 16px;
      margin-top: 4px; font-size: 12px; line-height: 2;
    }
    .diag-row { display: flex; justify-content: space-between; }
    .diag-label { color: rgba(255,255,255,0.4); }
    .ok { color: #4ade80; } .fail { color: #f87171; } .warn { color: #fbbf24; }
    #error-box {
      width: 100%; max-width: 300px;
      background: rgba(248,113,113,0.1);
      border: 1px solid rgba(248,113,113,0.3);
      border-radius: 12px; padding: 14px 16px;
      margin-top: 12px; font-size: 13px; line-height: 1.6; color: #fca5a5;
    }
    /* AR UI */
    #ar-ui {
      position: fixed; inset: 0;
      pointer-events: none; z-index: 200; display: none;
    }
    #ar-ui.visible { display: block; }
    #hint {
      position: absolute; bottom: 130px; left: 50%; transform: translateX(-50%);
      background: rgba(0,0,0,0.6); backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
      border-radius: 50px; padding: 10px 20px;
      font-size: 13px; color: rgba(255,255,255,0.85); white-space: nowrap;
    }
    #exit-btn {
      position: absolute; bottom: 52px; left: 50%; transform: translateX(-50%);
      pointer-events: all;
      background: rgba(255,255,255,0.15); backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
      border: 1px solid rgba(255,255,255,0.2); border-radius: 50px;
      padding: 14px 36px; font-size: 15px; font-weight: 500; color: #fff;
      cursor: pointer; -webkit-tap-highlight-color: transparent;
    }
    #loading-msg {
      position: absolute; top: 50%; left: 50%; transform: translate(-50%,-50%);
      background: rgba(0,0,0,0.55); border-radius: 50px;
      padding: 10px 22px; font-size: 13px; color: rgba(255,255,255,0.7);
    }
    canvas { position: fixed; inset: 0; display: block; z-index: 1; }
  </style>
</head>
<body>
 
<div id="overlay">
  <div class="icon">🔭</div>
  <h1>AR Viewer</h1>
  <p class="sub">Поставь модель в своей комнате и обходи со всех сторон</p>
 
  <button class="btn btn-primary" id="ar-btn">Запустить AR</button>
  <button class="btn btn-secondary" id="diag-btn">Диагностика</button>
 
  <div id="diag-box" style="display:none">
    <div class="diag-row"><span class="diag-label">HTTPS</span><span id="d-https">…</span></div>
    <div class="diag-row"><span class="diag-label">navigator.xr</span><span id="d-xr">…</span></div>
    <div class="diag-row"><span class="diag-label">immersive-ar</span><span id="d-ar">…</span></div>
    <div class="diag-row"><span class="diag-label">model.glb</span><span id="d-model">…</span></div>
  </div>
 
  <div id="error-box" style="display:none"></div>
</div>
 
<div id="ar-ui">
  <div id="loading-msg" style="display:none">Загрузка модели…</div>
  <div id="hint">Направь камеру на пол</div>
  <button id="exit-btn">✕ Выйти</button>
</div>
 
<!-- THREE.js UMD (не module!) -->
<script src="https://cdn.jsdelivr.net/npm/three@0.165.0/build/three.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.165.0/examples/js/loaders/GLTFLoader.js"></script>
 
<script>
(function() {
  'use strict';
 
  var MODEL_URL = './model.glb';
 
  // DOM
  var overlay    = document.getElementById('overlay');
  var arBtn      = document.getElementById('ar-btn');
  var diagBtn    = document.getElementById('diag-btn');
  var diagBox    = document.getElementById('diag-box');
  var errorBox   = document.getElementById('error-box');
  var arUI       = document.getElementById('ar-ui');
  var hintEl     = document.getElementById('hint');
  var exitBtn    = document.getElementById('exit-btn');
  var loadingMsg = document.getElementById('loading-msg');
 
  // State
  var renderer, scene, camera, clock;
  var mixer, model;
  var reticle, hitTestSource, xrSession, localSpace;
  var modelPlaced = false;
  var modelLoaded  = false;
 
  // ── Helpers ──────────────────────────────────────────────────────────────
  function showError(msg) {
    if (!msg) { errorBox.style.display = 'none'; return; }
    errorBox.textContent = msg;
    errorBox.style.display = 'block';
  }
 
  function setDiag(id, text, cls) {
    var el = document.getElementById(id);
    el.textContent = text;
    el.className = cls;
  }
 
  // ── Diagnostics ──────────────────────────────────────────────────────────
  diagBtn.addEventListener('click', function() {
    diagBox.style.display = diagBox.style.display === 'none' ? 'block' : 'none';
    if (diagBox.style.display === 'none') return;
 
    var isHttps = location.protocol === 'https:' || location.hostname === 'localhost';
    setDiag('d-https', isHttps ? '✓ ' + location.protocol : '✗ нужен HTTPS', isHttps ? 'ok' : 'fail');
 
    var hasXR = !!navigator.xr;
    setDiag('d-xr', hasXR ? '✓ есть' : '✗ нет (не Chrome?)', hasXR ? 'ok' : 'fail');
 
    if (hasXR) {
      navigator.xr.isSessionSupported('immersive-ar')
        .then(function(ok) {
          setDiag('d-ar', ok ? '✓ поддерживается' : '✗ нет (нет ARCore?)', ok ? 'ok' : 'fail');
        })
        .catch(function() { setDiag('d-ar', '✗ ошибка', 'fail'); });
    } else {
      setDiag('d-ar', '—', 'warn');
    }
 
    fetch(MODEL_URL, { method: 'HEAD' })
      .then(function(r) {
        setDiag('d-model', r.ok ? '✓ ' + r.status : '✗ ' + r.status, r.ok ? 'ok' : 'fail');
      })
      .catch(function(e) { setDiag('d-model', '✗ ' + e.message, 'fail'); });
  });
 
  // ── AR Button ────────────────────────────────────────────────────────────
  arBtn.addEventListener('click', function() {
    showError('');
 
    if (location.protocol !== 'https:' && location.hostname !== 'localhost') {
      showError('Нужен HTTPS. Открывай ссылку через https://username.github.io/...');
      return;
    }
    if (!navigator.xr) {
      showError('WebXR недоступен. Используй Chrome на Android. Версия 81+.');
      return;
    }
 
    navigator.xr.isSessionSupported('immersive-ar').then(function(supported) {
      if (!supported) {
        showError('AR не поддерживается. Нужен Android с ARCore (Google Play Services for AR) и Chrome 81+.');
        return;
      }
      initThree();
      startAR();
    }).catch(function(e) {
      showError('Ошибка проверки AR: ' + e.message);
    });
  });
 
  // ── Three.js init ─────────────────────────────────────────────────────────
  function initThree() {
    clock = new THREE.Clock();
 
    renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
    renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
    renderer.setSize(window.innerWidth, window.innerHeight);
    renderer.xr.enabled = true;
    renderer.outputColorSpace = THREE.SRGBColorSpace;
    document.body.appendChild(renderer.domElement);
 
    scene = new THREE.Scene();
    camera = new THREE.PerspectiveCamera(70, window.innerWidth / window.innerHeight, 0.01, 100);
 
    scene.add(new THREE.HemisphereLight(0xffffff, 0x443333, 1.5));
    var dir = new THREE.DirectionalLight(0xffffff, 1.0);
    dir.position.set(1, 3, 2);
    scene.add(dir);
 
    // Reticle
    var geo = new THREE.RingGeometry(0.07, 0.10, 32);
    geo.applyMatrix4(new THREE.Matrix4().makeRotationX(-Math.PI / 2));
    reticle = new THREE.Mesh(geo, new THREE.MeshBasicMaterial({ color: 0x4af0ff, side: THREE.DoubleSide }));
    reticle.matrixAutoUpdate = false;
    reticle.visible = false;
    scene.add(reticle);
  }
 
  // ── Load model ────────────────────────────────────────────────────────────
  function loadModel() {
    loadingMsg.style.display = 'block';
    var loader = new THREE.GLTFLoader();
    loader.load(
      MODEL_URL,
      function(gltf) {
        loadingMsg.style.display = 'none';
        model = gltf.scene;
        modelLoaded = true;
 
        if (gltf.animations && gltf.animations.length) {
          mixer = new THREE.AnimationMixer(model);
          gltf.animations.forEach(function(clip) {
            mixer.clipAction(clip).play();
          });
        }
 
        // Прозрачный пол-полигон
        model.traverse(function(child) {
          if (!child.isMesh) return;
          var mats = Array.isArray(child.material) ? child.material : [child.material];
          mats.forEach(function(mat) {
            if (mat.opacity < 1.0 || mat.transparent) {
              mat.transparent = true;
              mat.depthWrite  = false;
              mat.alphaTest   = 0;
              mat.side        = THREE.DoubleSide;
            }
          });
        });
 
        model.visible = false;
        scene.add(model);
      },
      undefined,
      function(err) {
        loadingMsg.style.display = 'none';
        hintEl.textContent = '⚠ Ошибка загрузки model.glb';
        console.error(err);
      }
    );
  }
 
  // ── Start AR ──────────────────────────────────────────────────────────────
  function startAR() {
    var sessionOpts = {
      requiredFeatures: ['hit-test'],
      optionalFeatures: ['dom-overlay'],
      domOverlay: { root: document.body }
    };
 
    navigator.xr.requestSession('immersive-ar', sessionOpts)
      .catch(function(e) {
        // hit-test не поддерживается — пробуем без него
        console.warn('Retry without hit-test:', e);
        return navigator.xr.requestSession('immersive-ar', {
          optionalFeatures: ['dom-overlay'],
          domOverlay: { root: document.body }
        });
      })
      .then(function(session) {
        xrSession = session;
        renderer.xr.setReferenceSpaceType('local');
        return renderer.xr.setSession(session).then(function() { return session; });
      })
      .then(function(session) {
        session.addEventListener('end', onSessionEnd);
        session.addEventListener('select', onSelect);
 
        overlay.classList.add('hidden');
        arUI.classList.add('visible');
        loadModel();
 
        // Hit-test source
        return Promise.all([
          session.requestReferenceSpace('viewer'),
          session.requestReferenceSpace('local')
        ]).then(function(spaces) {
          localSpace = spaces[1];
          return session.requestHitTestSource({ space: spaces[0] });
        }).then(function(src) {
          hitTestSource = src;
        });
      })
      .catch(function(e) {
        showError('Не удалось запустить AR: ' + e.message);
        if (renderer) { renderer.domElement.remove(); renderer.dispose(); renderer = null; }
      });
 
    // Запускаем render loop
    setTimeout(function() {
      if (renderer) renderer.setAnimationLoop(onXRFrame);
    }, 500);
  }
 
  // ── Select (tap) ──────────────────────────────────────────────────────────
  function onSelect(event) {
    if (!modelLoaded || !model) return;
 
    if (reticle.visible) {
      model.position.setFromMatrixPosition(reticle.matrix);
      model.rotation.y = Math.random() * Math.PI * 2;
    } else {
      // Без hit-test — 1.5м перед камерой
      var refSpace = renderer.xr.getReferenceSpace();
      if (event.frame && refSpace) {
        var pose = event.frame.getViewerPose(refSpace);
        if (pose) {
          var t = pose.transform;
          var m = t.matrix;
          model.position.set(
            t.position.x + (-m[8]) * 1.5,
            t.position.y - 0.5,
            t.position.z + (-m[10]) * 1.5
          );
        }
      }
    }
 
    model.visible = true;
    modelPlaced = true;
    reticle.visible = false;
    hintEl.textContent = '🚶 Ходи вокруг модели!';
  }
 
  // ── Render loop ───────────────────────────────────────────────────────────
  function onXRFrame(timestamp, frame) {
    if (!frame) return;
 
    if (mixer) mixer.update(clock.getDelta());
 
    if (hitTestSource && localSpace && !modelPlaced) {
      var results = frame.getHitTestResults(hitTestSource);
      if (results.length > 0) {
        var pose = results[0].getPose(localSpace);
        if (pose) {
          reticle.visible = true;
          reticle.matrix.fromArray(pose.transform.matrix);
        }
      } else {
        reticle.visible = false;
      }
    }
 
    renderer.render(scene, camera);
  }
 
  // ── Exit ──────────────────────────────────────────────────────────────────
  function onSessionEnd() {
    if (hitTestSource) { try { hitTestSource.cancel(); } catch(e) {} hitTestSource = null; }
    xrSession = null;
    modelPlaced = false;
    modelLoaded = false;
    mixer = null;
    model = null;
    arUI.classList.remove('visible');
    overlay.classList.remove('hidden');
    if (renderer) {
      renderer.setAnimationLoop(null);
      renderer.domElement.remove();
      renderer.dispose();
      renderer = null;
    }
  }
 
  exitBtn.addEventListener('click', function() {
    if (xrSession) xrSession.end();
  });
 
  window.addEventListener('resize', function() {
    if (!renderer || !camera) return;
    camera.aspect = window.innerWidth / window.innerHeight;
    camera.updateProjectionMatrix();
    renderer.setSize(window.innerWidth, window.innerHeight);
  });
 
})();
</script>
</body>
</html>
