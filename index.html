<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AR Experience</title>
    <style>
        body { 
            margin: 0; 
            overflow: hidden; 
            background-color: #1a1a1a;
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
        }
        #ui-container {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            pointer-events: none;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 100;
        }
        #loading {
            background: rgba(0, 0, 0, 0.8);
            color: white;
            padding: 15px 30px;
            border-radius: 30px;
            font-size: 16px;
            backdrop-filter: blur(5px);
            transition: opacity 0.5s;
        }
        #instruction {
            position: absolute;
            bottom: 100px;
            background: rgba(255, 255, 255, 0.9);
            color: #333;
            padding: 12px 24px;
            border-radius: 20px;
            font-weight: 500;
            font-size: 15px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
            display: none;
            text-align: center;
            width: 80%;
            max-width: 300px;
        }
    </style>
    <script async src="https://unpkg.com/es-module-shims@1.8.0/dist/es-module-shims.js"></script>
    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
                "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
            }
        }
    </script>
</head>
<body>
    <div id="ui-container">
        <div id="loading">Loading 3D models (0/3)...</div>
        <div id="instruction">Point the reticle at the floor and tap the screen</div>
    </div>
    
    <script type="module">
        import * as THREE from 'three';
        import { ARButton } from 'three/addons/webxr/ARButton.js';
        import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';

        let camera, scene, renderer;
        let mixers = [];
        const clock = new THREE.Clock();

        let baseGroup, reticle, controller;
        let hitTestSource = null;
        let hitTestSourceRequested = false;

        const MIN_DISTANCE = 4.5; 
        const TARGET_MODEL_SIZE = 1.2; 
        const placedPositions = [];
        let loadedCount = 0;

        init();
        animate();

        function init() {
            const container = document.createElement('div');
            document.body.appendChild(container);

            scene = new THREE.Scene();
            camera = new THREE.PerspectiveCamera(70, window.innerWidth / window.innerHeight, 0.01, 25);

            const ambientLight = new THREE.AmbientLight(0xffffff, 1.5);
            scene.add(ambientLight);
            
            const directionalLight = new THREE.DirectionalLight(0xffffff, 2);
            directionalLight.position.set(2, 5, 3);
            scene.add(directionalLight);

            baseGroup = new THREE.Group();
            baseGroup.visible = false;
            scene.add(baseGroup);

            renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
            renderer.setPixelRatio(window.devicePixelRatio);
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.xr.enabled = true;
            container.appendChild(renderer.domElement);

            const arButton = ARButton.createButton(renderer, { requiredFeatures: ['hit-test'] });
            arButton.style.bottom = '30px';
            arButton.style.padding = '12px 24px';
            arButton.style.borderRadius = '30px';
            arButton.style.fontWeight = 'bold';
            arButton.style.display = 'none'; 
            document.body.appendChild(arButton);

            reticle = new THREE.Mesh(
                new THREE.RingGeometry(0.15, 0.2, 32).rotateX(-Math.PI / 2),
                new THREE.MeshBasicMaterial({ color: 0xffffff })
            );
            reticle.matrixAutoUpdate = false;
            reticle.visible = false;
            scene.add(reticle);

            controller = renderer.xr.getController(0);
            controller.addEventListener('select', onSelect);
            scene.add(controller);

            const manager = new THREE.LoadingManager();
            manager.onLoad = function () {
                document.getElementById('loading').style.display = 'none';
                arButton.style.display = 'block';
            };

            const loader = new GLTFLoader(manager);
            const models = ['Turtle.glb', 'Whale.glb', 'Iguana.glb'];

            models.forEach(modelFile => {
                loader.load(modelFile, function (gltf) {
                    loadedCount++;
                    document.getElementById('loading').innerText = `Loading 3D models (${loadedCount}/3)...`;

                    const model = gltf.scene;

                    const box = new THREE.Box3().setFromObject(model);
                    const size = box.getSize(new THREE.Vector3());
                    const maxDimension = Math.max(size.x, size.y, size.z);
                    if (maxDimension > 0) {
                        const scaleFactor = TARGET_MODEL_SIZE / maxDimension;
                        model.scale.set(scaleFactor, scaleFactor, scaleFactor);
                    }

                    const coords = generateSafePosition();
                    model.position.set(coords.x, 0, coords.z);
                    model.rotation.y = Math.random() * Math.PI * 2;

                    baseGroup.add(model);

                    if (gltf.animations && gltf.animations.length > 0) {
                        const mixer = new THREE.AnimationMixer(model);
                        gltf.animations.forEach((clip) => {
                            mixer.clipAction(clip).play();
                        });
                        mixers.push(mixer);
                    }
                });
            });

            renderer.xr.addEventListener('sessionstart', () => {
                document.getElementById('instruction').style.display = 'block';
            });
            renderer.xr.addEventListener('sessionend', () => {
                document.getElementById('instruction').style.display = 'none';
                baseGroup.visible = false;
                reticle.visible = false;
            });

            window.addEventListener('resize', onWindowResize);
        }

        function onSelect() {
            if (reticle.visible) {
                baseGroup.position.setFromMatrixPosition(reticle.matrix);
                baseGroup.visible = true;
                document.getElementById('instruction').innerText = "Models placed! Tap again to reposition.";
                setTimeout(() => {
                    document.getElementById('instruction').style.display = 'none';
                }, 3000);
            }
        }

        function generateSafePosition() {
            let x, z;
            let isValid = false;
            let attempts = 0;
            while (!isValid && attempts < 1000) {
                x = (Math.random() - 0.5) * 12; 
                z = (Math.random() - 0.5) * 12; 
                isValid = true;
                for (let i = 0; i < placedPositions.length; i++) {
                    const other = placedPositions[i];
                    const distance = Math.sqrt(Math.pow(x - other.x, 2) + Math.pow(z - other.z, 2));
                    if (distance < MIN_DISTANCE) {
                        isValid = false; 
                        break;
                    }
                }
                attempts++;
            }
            const finalPos = { x: x, z: z };
            placedPositions.push(finalPos);
            return finalPos;
        }

        function onWindowResize() {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        }

        function animate() {
            renderer.setAnimationLoop(render);
        }

        function render(timestamp, frame) {
            const delta = clock.getDelta();
            mixers.forEach(mixer => mixer.update(delta));

            if (frame) {
                const referenceSpace = renderer.xr.getReferenceSpace();
                const session = renderer.xr.getSession();

                if (hitTestSourceRequested === false) {
                    session.requestReferenceSpace('viewer').then(function (viewerSpace) {
                        session.requestHitTestSource({ space: viewerSpace }).then(function (source) {
                            hitTestSource = source;
                        });
                    });
                    hitTestSourceRequested = true;
                }

                if (hitTestSource) {
                    const hitTestResults = frame.getHitTestResults(hitTestSource);
                    if (hitTestResults.length > 0) {
                        const hit = hitTestResults[0];
                        reticle.visible = true;
                        reticle.matrix.fromArray(hit.getPose(referenceSpace).transform.matrix);
                    } else {
                        reticle.visible = false;
                    }
                }
            }
            renderer.render(scene, camera);
        }
    </script>
</body>
</html>
