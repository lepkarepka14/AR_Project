<!DOCTYPE html>
<html>
  <head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AR_Project - Force AR</title>
    <script type="module" src="https://ajax.googleapis.com/ajax/libs/model-viewer/3.4.0/model-viewer.min.js"></script>
    <style>
      body { margin: 0; width: 100vw; height: 100vh; background-color: #f0f0f0; }
      model-viewer { width: 100%; height: 100%; }
    </style>
  </head>
  <body>
    <model-viewer 
      src="model.glb" 
      ar 
      ar-modes="webxr scene-viewer quick-look"
      ar-placement="floor"
      camera-controls 
      autoplay 
      shadow-intensity="1">
      
      <button slot="ar-button" style="background-color: white; border-radius: 4px; border: none; padding: 12px 16px; position: absolute; bottom: 20px; right: 20px;">
        Запустить AR на полу
      </button>
    </model-viewer>
  </body>
</html>
