<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
  <title>AR Viewer</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #0a0a0f;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      overflow: hidden;
      height: 100dvh;
      width: 100vw;
      color: #fff;
    }
 
    #overlay {
      position: fixed;
      inset: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 24px;
      z-index: 10;
      transition: opacity 0.5s ease;
    }
    #overlay.hidden { opacity: 0; pointer-events: none; }
 
    .icon { font-size: 56px; margin-bottom: 24px; }
 
    h1 { font-size: 24px; font-weight: 700; margin-bottom: 10px; text-align: center; }
 
    .sub {
      font-size: 14px;
      color: rgba(255,255,255,0.5);
      text-align: center;
      max-width: 280px;
      line-height: 1.6;
      margin-bottom: 36px;
    }
 
    .btn {
      width: 100%;
      max-width: 300px;
      padding: 16px;
      border-radius: 14px;
      border: none;
      font-size: 16px;
      font-weight: 600;
      cursor: pointer;
      margin-bottom: 12px;
      -webkit-tap-highlight-color: transparent;
      transition: opacity 0.15s;
    }
    .btn:active { opacity: 0.75; }
    .btn-primary { background: #3b82f6; color: #fff; }
    .btn-secondary { background: rgba(255,255,255,0.08); color: rgba(255,255,255,0.8); border: 1px solid rgba(255,255,255,0.12); }
 
    #diag-box {
      width: 100%;
      max-width: 300px;
      background: rgba(255,255,255,0.05);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 12px;
      padding: 14px 16px;
      margin-top: 8px;
      font-size: 12px;
      line-height: 1.8;
      display: none;
    }
    #diag-box.visible { display: block; }
    .diag-row { display: flex; justify-content: space-between; gap: 12px; }
    .diag-label { color: rgba(255,255,255,0.4); }
    .ok { color: #4ade80; }
    .fail { color: #f87171; }
    .warn { color: #fbbf24; }
 
    #error-box {
      width: 100%;
      max-width: 300px;
      background: rgba(248,113,113,0.1);
      border: 1px solid rgba(248,113,113,0.3);
      border-radius: 12px;
      padding: 14px 16px;
      margin-top: 12px;
      font-size: 13px;
      line-height: 1.6;
      color: #fca5a5;
      display: none;
    }
    #error-box.visible { display: block; }
 
    /* AR UI */
    #ar-ui {
      position: fixed;
      inset: 0;
      pointer-events: none;
      z-index: 20;
      display: none;
    }
    #ar-ui.visible { display: block; }
 
    #hint {
      position: absolute;
      bottom: 120px;
      left: 50%;
      transform: translateX(-50%);
      background: rgba(0,0,0,0.6);
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
      border-radius: 50px;
      padding: 10px 20px;
      font-size: 13px;
      color: rgba(255,255,255,0.85);
      white-space: nowrap;
    }
 
    #exit-btn {
      position: absolute;
      bottom: 48px;
      left: 50%;
      transform: translateX(-50%);
      pointer-events: all;
      background: rgba(255,255,255,0.15);
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
      border: 1px solid rgba(255,255,255,0.2);
      border-radius: 50px;
      padding: 13px 32px;
      font-size: 15px;
      font-weight: 500;
      color: #fff;
      cursor: pointer;
      -webkit-tap-highlight-color: transparent;
    }
 
    #loading-indicator {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      font-size: 13px;
      color: rgba(255,255,255,0.6);
      background: rgba(0,0,0,0.5);
      padding: 10px 20px;
      border-radius: 50px;
      display: none;
    }
    #loading-indicator.visible { display: block; }
 
    canvas { display: block; position: fixed; inset: 0; }
  </style>
</head>
<body>
 
<div id="overlay">
  <div class="icon">🔭</div>
  <h1>AR Viewer</h1>
  <p class="sub">Поставь модель в своей комнате и обходи её со всех сторон</p>
 
  <button class="btn btn-primary" id="ar-btn">Запустить AR</button>
  <button class="btn btn-secondary" id="diag-btn">Диагностика</button>
 
  <div id="diag-box">
    <div class="diag-row"><span class="diag-label">HTTPS</span><span id="d-https">—</span></div>
    <div class="diag-row"><span class="diag-label">navigator.xr</span><span id="d-xr">—</span></div>
    <div class="diag-row"><span class="diag-label">immersive-ar</span><span id="d-ar">—</span></div>
    <div class="diag-row"><span class="diag-label">hit-test</span><span id="d-ht">—</span></div>
    <div class="diag-row"><span class="diag-label">model.glb</span><span id="d-model">—</span></div>
  </div>
 
  <div id="error-box"></div>
</div>
 
<div id="ar-ui">
  <div id="loading-indicator">Загрузка модели…</div>
  <div id="hint">Направь камеру на пол</div>
  <button id="exit-btn">✕ Выйти</button>
</div>
 
<script type="module">
import * as THREE from 'https://cdn.jsdelivr.net/npm/three@0.165.0/build/three.module.js';
import { GLTFLoader } from 'https://cdn.jsdelivr.net/npm/three@0.165.0/examples/jsm/loaders/GLTFLoader.js';
 
const MODEL_URL = './model.glb';
 
// ── DOM refs ────────────────────────────────────────────────────────────────
const overlay      = document.getElementById('overlay');
const arBtn        = document.getElementById('ar-btn');
const diagBtn      = document.getElementById('diag-btn');
const diagBox      = document.getElementById('diag-box');
const errorBox     = document.getElementById('error-box');
const arUI         = document.getElementById('ar-ui');
const hintEl       = document.getElementById('hint');
const exitBtn      = document.getElementById('exit-btn');
const loadingEl    = document.getElementById('loading-indicator');
 
// ── State ───────────────────────────────────────────────────────────────────
let renderer, scene, camera, clock;
let mixer, model;
let reticle, hitTestSource, xrSession, localSpace;
let modelPlaced = false;
let modelLoaded  = false;
 
// ── Diagnostics ─────────────────────────────────────────────────────────────
diagBtn.addEventListener('click', async () => {
  diagBox.classList.add('visible');
 
  const setRow = (id, val, cls) => {
    const el = document.getElementById(id);
    el.textContent = val;
    el.className = cls;
  };
 
  // HTTPS
  const isHttps = location.protocol === 'https:' || location.hostname === 'localhost';
  setRow('d-https', isHttps ? '✓ ' + location.protocol : '✗ нужен HTTPS', isHttps ? 'ok' : 'fail');
 
  // navigator.xr
  const hasXR = !!navigator.xr;
  setRow('d-xr', hasXR ? '✓ есть' : '✗ нет', hasXR ? 'ok' : 'fail');
 
  // immersive-ar
  if (hasXR) {
    const arSupp = await navigator.xr.isSessionSupported('immersive-ar').catch(() => false);
    setRow('d-ar', arSupp ? '✓ поддерживается' : '✗ не поддерживается', arSupp ? 'ok' : 'fail');
    setRow('d-ht', arSupp ? '✓ доступен' : '—', arSupp ? 'ok' : 'warn');
  } else {
    setRow('d-ar', '—', 'warn');
    setRow('d-ht', '—', 'warn');
  }
 
  // model.glb fetch check
  try {
    const r = await fetch(MODEL_URL, { method: 'HEAD' });
    setRow('d-model', r.ok ? `✓ ${r.status}` : `✗ ${r.status}`, r.ok ? 'ok' : 'fail');
  } catch(e) {
    setRow('d-model', '✗ ' + e.message, 'fail');
  }
});
 
// ── AR Button ────────────────────────────────────────────────────────────────
arBtn.addEventListener('click', async () => {
  showError('');
 
  // Проверки
  if (location.protocol !== 'https:' && location.hostname !== 'localhost') {
    showError('Нужен HTTPS. GitHub Pages автоматически даёт HTTPS — убедись что открываешь https://... а не http://');
    return;
  }
 
  if (!navigator.xr) {
    showError('navigator.xr недоступен. Убедись что используешь Chrome (не Samsung Browser, не Firefox). Версия Chrome должна быть 81+.');
    return;
  }
 
  const arSupported = await navigator.xr.isSessionSupported('immersive-ar').catch(() => false);
  if (!arSupported) {
    showError('AR не поддерживается этим устройством или браузером. Нужен Android с ARCore и Chrome 81+. Проверь: в адресной строке Chrome напечатай chrome://flags и включи "WebXR AR Module".');
    return;
  }
 
  initThree();
  await startAR();
});
 
function showError(msg) {
  if (!msg) { errorBox.classList.remove('visible'); return; }
  errorBox.textContent = msg;
  errorBox.classList.add('visible');
}
 
// ── Three.js ─────────────────────────────────────────────────────────────────
function initThree() {
  clock = new THREE.Clock();
 
  renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
  renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
  renderer.setSize(window.innerWidth, window.innerHeight);
  renderer.xr.enabled = true;
  renderer.outputColorSpace = THREE.SRGBColorSpace;
  document.body.appendChild(renderer.domElement);
 
  scene = new THREE.Scene();
  camera = new THREE.PerspectiveCamera(70, window.innerWidth / window.innerHeight, 0.01, 100);
 
  // Свет
  scene.add(new THREE.HemisphereLight(0xffffff, 0x443333, 1.5));
  const dir = new THREE.DirectionalLight(0xffffff, 1.0);
  dir.position.set(1, 3, 2);
  scene.add(dir);
 
  // Reticle
  const geo = new THREE.RingGeometry(0.07, 0.10, 32);
  geo.applyMatrix4(new THREE.Matrix4().makeRotationX(-Math.PI / 2));
  reticle = new THREE.Mesh(geo, new THREE.MeshBasicMaterial({ color: 0x4af0ff, side: THREE.DoubleSide }));
  reticle.matrixAutoUpdate = false;
  reticle.visible = false;
  scene.add(reticle);
}
 
// ── Загрузка модели ──────────────────────────────────────────────────────────
function loadModel() {
  loadingEl.classList.add('visible');
  const loader = new GLTFLoader();
  loader.load(
    MODEL_URL,
    (gltf) => {
      loadingEl.classList.remove('visible');
      model = gltf.scene;
      modelLoaded = true;
 
      // Анимации
      if (gltf.animations?.length) {
        mixer = new THREE.AnimationMixer(model);
        gltf.animations.forEach(clip => mixer.clipAction(clip).play());
      }
 
      // Прозрачный пол-полигон — сохраняем прозрачность корректно
      model.traverse(child => {
        if (!child.isMesh) return;
        const mats = Array.isArray(child.material) ? child.material : [child.material];
        mats.forEach(mat => {
          if (mat.opacity < 1.0 || mat.transparent) {
            mat.transparent = true;
            mat.depthWrite  = false;
            mat.alphaTest   = 0;
            mat.side        = THREE.DoubleSide;
          }
        });
      });
 
      model.visible = false;
      scene.add(model);
    },
    undefined,
    (err) => {
      loadingEl.classList.remove('visible');
      console.error('GLB load error', err);
      hintEl.textContent = '⚠ Не удалось загрузить model.glb';
    }
  );
}
 
// ── WebXR Session ─────────────────────────────────────────────────────────────
async function startAR() {
  try {
    xrSession = await navigator.xr.requestSession('immersive-ar', {
      requiredFeatures: ['hit-test'],
      optionalFeatures: ['dom-overlay'],
      domOverlay: { root: document.body }
    });
  } catch(e) {
    // hit-test недоступен — попробуем без него
    console.warn('hit-test failed, retrying without:', e);
    try {
      xrSession = await navigator.xr.requestSession('immersive-ar', {
        optionalFeatures: ['dom-overlay'],
        domOverlay: { root: document.body }
      });
      hintEl.textContent = 'Hit-test недоступен — тап поставит модель перед тобой';
    } catch(e2) {
      showError('Не удалось запустить AR: ' + e2.message);
      if (renderer) { renderer.domElement.remove(); renderer.dispose(); renderer = null; }
      return;
    }
  }
 
  renderer.xr.setReferenceSpaceType('local');
  await renderer.xr.setSession(xrSession);
 
  xrSession.addEventListener('end', onSessionEnd);
 
  overlay.classList.add('hidden');
  arUI.classList.add('visible');
 
  loadModel();
 
  // Spaces
  try {
    const viewerSpace = await xrSession.requestReferenceSpace('viewer');
    localSpace = await xrSession.requestReferenceSpace('local');
    hitTestSource = await xrSession.requestHitTestSource({ space: viewerSpace });
  } catch(e) {
    console.warn('Hit-test source error:', e);
    hitTestSource = null;
  }
 
  xrSession.addEventListener('select', onSelect);
  renderer.setAnimationLoop(onXRFrame);
}
 
// ── Тап ───────────────────────────────────────────────────────────────────────
function onSelect(event) {
  if (!modelLoaded || !model) return;
 
  if (reticle.visible) {
    // Ставим по reticle
    model.position.setFromMatrixPosition(reticle.matrix);
    model.rotation.y = Math.random() * Math.PI * 2;
  } else {
    // Без hit-test — ставим в 1.5м перед камерой
    const refSpace = renderer.xr.getReferenceSpace();
    const frame = event.frame;
    if (frame && refSpace) {
      const pose = frame.getViewerPose(refSpace);
      if (pose) {
        const t = pose.transform;
        const forward = new THREE.Vector3(
          -t.matrix[8], -t.matrix[9], -t.matrix[10]
        ).normalize().multiplyScalar(1.5);
        model.position.set(
          t.position.x + forward.x,
          t.position.y - 0.5,
          t.position.z + forward.z
        );
      }
    }
  }
 
  model.visible = true;
  modelPlaced = true;
  reticle.visible = false;
  hintEl.textContent = 'Ходи вокруг модели!';
}
 
// ── Render loop ───────────────────────────────────────────────────────────────
function onXRFrame(timestamp, frame) {
  if (!frame) return;
 
  if (mixer) mixer.update(clock.getDelta());
 
  if (hitTestSource && localSpace && !modelPlaced) {
    const results = frame.getHitTestResults(hitTestSource);
    if (results.length > 0) {
      const pose = results[0].getPose(localSpace);
      if (pose) {
        reticle.visible = true;
        reticle.matrix.fromArray(pose.transform.matrix);
      }
    } else {
      reticle.visible = false;
    }
  }
 
  renderer.render(scene, camera);
}
 
// ── Exit ──────────────────────────────────────────────────────────────────────
function onSessionEnd() {
  hitTestSource?.cancel?.();
  hitTestSource = null;
  xrSession = null;
  modelPlaced = false;
  modelLoaded = false;
  mixer = null;
  model = null;
  arUI.classList.remove('visible');
  overlay.classList.remove('hidden');
  if (renderer) {
    renderer.setAnimationLoop(null);
    renderer.domElement.remove();
    renderer.dispose();
    renderer = null;
  }
}
 
exitBtn.addEventListener('click', () => xrSession?.end());
 
window.addEventListener('resize', () => {
  if (!renderer || !camera) return;
  camera.aspect = window.innerWidth / window.innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(window.innerWidth, window.innerHeight);
});
</script>
</body>
</html>
