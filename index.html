<!DOCTYPE html>
<html>
  <head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script type="module" src="https://ajax.googleapis.com/ajax/libs/model-viewer/3.4.0/model-viewer.min.js"></script>
    <style>
      body { margin: 0; padding: 0; width: 100vw; height: 100vh; }
      model-viewer { width: 100%; height: 100%; background-color: #ffffff; }
    </style>
  </head>
  <body>
    <model-viewer 
      id="mv"
      src="model.glb" 
      ar 
      ar-modes="webxr scene-viewer quick-look" 
      camera-controls 
      autoplay 
      ar-placement="floor">
    </model-viewer>

    <script>
      const mv = document.querySelector('#mv');
      // Принудительный лог в консоль браузера
      mv.addEventListener('ar-status', (event) => {
        console.log("AR статус:", event.detail.status);
      });
      // Если кнопка не появляется сама, пробуем вызвать её программно
      window.onload = () => {
        if (!mv.canActivateAR) {
          alert("Ошибка: AR не поддерживается на этом устройстве");
        }
      };
    </script>
  </body>
</html>
