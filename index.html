<!DOCTYPE html>
<html>
  <head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Надежный AR (WebXR)</title>
    <script src="https://aframe.io/releases/1.4.2/aframe.min.js"></script>
    <script src="https://cdn.jsdelivr.net/gh/c-frame/aframe-extras@7.0.0/dist/aframe-extras.min.js"></script>
    <style>
      body { margin: 0; overflow: hidden; }
    </style>
  </head>
  <body>
    <a-scene webxr="optionalFeatures: hit-test;" renderer="colorManagement: true;">
      
      <a-assets>
        <a-asset-item id="test-model" src="model.glb"></a-asset-item>
      </a-assets>

      <a-camera position="0 1.6 0"></a-camera>

      <a-entity position="0 0 -2">
        <a-gltf-model src="#test-model" animation-mixer></a-gltf-model>
      </a-entity>

    </a-scene>
  </body>
</html>
