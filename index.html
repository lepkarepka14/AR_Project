<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
  <title>AR Viewer</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
 
    body {
      background: #000;
      font-family: 'SF Pro Display', -apple-system, BlinkMacSystemFont, sans-serif;
      overflow: hidden;
      height: 100dvh;
      width: 100vw;
    }
 
    #overlay {
      position: fixed;
      inset: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      background: radial-gradient(ellipse at 50% 60%, #0d1b2a 0%, #000 100%);
      z-index: 10;
      transition: opacity 0.6s ease;
    }
 
    #overlay.hidden {
      opacity: 0;
      pointer-events: none;
    }
 
    .logo-ring {
      width: 120px;
      height: 120px;
      border-radius: 50%;
      border: 2px solid rgba(255,255,255,0.08);
      display: flex;
      align-items: center;
      justify-content: center;
      position: relative;
      margin-bottom: 32px;
      animation: pulse-ring 3s ease-in-out infinite;
    }
 
    .logo-ring::before {
      content: '';
      position: absolute;
      inset: -8px;
      border-radius: 50%;
      border: 1px solid rgba(99,202,255,0.15);
      animation: pulse-ring 3s ease-in-out infinite 0.5s;
    }
 
    .logo-ring::after {
      content: '';
      position: absolute;
      inset: -18px;
      border-radius: 50%;
      border: 1px solid rgba(99,202,255,0.07);
      animation: pulse-ring 3s ease-in-out infinite 1s;
    }
 
    @keyframes pulse-ring {
      0%, 100% { transform: scale(1); opacity: 1; }
      50% { transform: scale(1.04); opacity: 0.7; }
    }
 
    .ar-icon {
      font-size: 48px;
      filter: drop-shadow(0 0 20px rgba(99,202,255,0.5));
    }
 
    h1 {
      font-size: 22px;
      font-weight: 600;
      color: #fff;
      letter-spacing: -0.3px;
      margin-bottom: 8px;
      text-align: center;
    }
 
    p.sub {
      font-size: 14px;
      color: rgba(255,255,255,0.45);
      text-align: center;
      max-width: 260px;
      line-height: 1.5;
      margin-bottom: 40px;
    }
 
    #ar-btn {
      background: linear-gradient(135deg, #63caff 0%, #3b82f6 100%);
      border: none;
      border-radius: 50px;
      padding: 16px 40px;
      font-size: 16px;
      font-weight: 600;
      color: #000;
      cursor: pointer;
      letter-spacing: -0.2px;
      box-shadow: 0 8px 32px rgba(59,130,246,0.4);
      transition: transform 0.15s ease, box-shadow 0.15s ease;
      -webkit-tap-highlight-color: transparent;
    }
 
    #ar-btn:active {
      transform: scale(0.96);
      box-shadow: 0 4px 16px rgba(59,130,246,0.3);
    }
 
    #ios-btn {
      display: none;
      margin-top: 14px;
      background: transparent;
      border: 1px solid rgba(255,255,255,0.2);
      border-radius: 50px;
      padding: 14px 32px;
      font-size: 14px;
      font-weight: 500;
      color: rgba(255,255,255,0.7);
      cursor: pointer;
      -webkit-tap-highlight-color: transparent;
    }
 
    #error-msg {
      display: none;
      margin-top: 20px;
      font-size: 13px;
      color: rgba(255,120,100,0.8);
      text-align: center;
      max-width: 280px;
      line-height: 1.5;
    }
 
    #ui-overlay {
      position: fixed;
      bottom: 40px;
      left: 50%;
      transform: translateX(-50%);
      z-index: 20;
      display: none;
      flex-direction: column;
      align-items: center;
      gap: 12px;
      pointer-events: none;
    }
 
    #ui-overlay.visible { display: flex; }
 
    .hint-pill {
      background: rgba(0,0,0,0.55);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      border: 1px solid rgba(255,255,255,0.12);
      border-radius: 50px;
      padding: 10px 20px;
      font-size: 13px;
      color: rgba(255,255,255,0.8);
      text-align: center;
      pointer-events: none;
    }
 
    #exit-btn {
      pointer-events: all;
      background: rgba(255,255,255,0.12);
      backdrop-filter: blur(12px);
      border: 1px solid rgba(255,255,255,0.2);
      border-radius: 50px;
      padding: 12px 28px;
      font-size: 14px;
      font-weight: 500;
      color: #fff;
      cursor: pointer;
      -webkit-tap-highlight-color: transparent;
    }
 
    canvas { display: block; }
  </style>
</head>
<body>
 
<div id="overlay">
  <div class="logo-ring">
    <span class="ar-icon">🔭</span>
  </div>
  <h1>AR Viewer</h1>
  <p class="sub">Направь камеру на пол и поставь модель в своей комнате</p>
  <button id="ar-btn">Открыть в AR</button>
  <button id="ios-btn">Открыть через iOS AR</button>
  <div id="error-msg"></div>
</div>
 
<div id="ui-overlay">
  <div class="hint-pill" id="hint-text">Направь камеру на пол для размещения</div>
  <button id="exit-btn">✕ Выйти</button>
</div>
 
<!-- Three.js + WebXR -->
<script type="module">
  import * as THREE from 'https://cdn.jsdelivr.net/npm/three@0.165.0/build/three.module.js';
  import { GLTFLoader } from 'https://cdn.jsdelivr.net/npm/three@0.165.0/examples/jsm/loaders/GLTFLoader.js';
 
  const MODEL_URL = './model.glb'; // путь к модели рядом с index.html
 
  let renderer, scene, camera, clock;
  let mixer, model;
  let reticle, hitTestSource, xrSession;
  let modelPlaced = false;
  let localSpace;
 
  const overlay = document.getElementById('overlay');
  const uiOverlay = document.getElementById('ui-overlay');
  const hintText = document.getElementById('hint-text');
  const arBtn = document.getElementById('ar-btn');
  const iosBtn = document.getElementById('ios-btn');
  const errorMsg = document.getElementById('error-msg');
 
  // ── Определяем платформу ────────────────────────────────────────────────────
  const isIOS = /iPad|iPhone|iPod/.test(navigator.userAgent) && !window.MSStream;
 
  // ── iOS: Quick Look через <a rel="ar"> ─────────────────────────────────────
  if (isIOS) {
    iosBtn.style.display = 'block';
    iosBtn.addEventListener('click', () => {
      const link = document.createElement('a');
      link.rel = 'ar';
      link.href = MODEL_URL;           // Quick Look принимает .glb / .usdz
      link.appendChild(document.createElement('img')); // обязательный дочерний элемент
      document.body.appendChild(link);
      link.click();
      document.body.removeChild(link);
    });
  }
 
  // ── WebXR AR (Android Chrome + ARCore) ──────────────────────────────────────
  async function checkWebXRSupport() {
    if (!navigator.xr) return false;
    return await navigator.xr.isSessionSupported('immersive-ar').catch(() => false);
  }
 
  arBtn.addEventListener('click', async () => {
    const supported = await checkWebXRSupport();
    if (!supported) {
      errorMsg.style.display = 'block';
      errorMsg.textContent = 'WebXR AR не поддерживается этим браузером. На Android используй Chrome, на iOS — кнопку «Открыть через iOS AR».';
      return;
    }
    initThree();
    startARSession();
  });
 
  // ── Three.js init ───────────────────────────────────────────────────────────
  function initThree() {
    clock = new THREE.Clock();
 
    renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
    renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
    renderer.setSize(window.innerWidth, window.innerHeight);
    renderer.xr.enabled = true;
    renderer.outputColorSpace = THREE.SRGBColorSpace;
    renderer.toneMapping = THREE.ACESFilmicToneMapping;
    renderer.toneMappingExposure = 1.2;
    document.body.appendChild(renderer.domElement);
 
    scene = new THREE.Scene();
 
    camera = new THREE.PerspectiveCamera(70, window.innerWidth / window.innerHeight, 0.01, 100);
 
    // Освещение
    const hemi = new THREE.HemisphereLight(0xffffff, 0x444444, 1.2);
    scene.add(hemi);
    const dirLight = new THREE.DirectionalLight(0xffffff, 0.8);
    dirLight.position.set(1, 3, 2);
    scene.add(dirLight);
 
    // Reticle — прицел на полу
    const ringGeo = new THREE.RingGeometry(0.06, 0.09, 32);
    ringGeo.applyMatrix4(new THREE.Matrix4().makeRotationX(-Math.PI / 2));
    const ringMat = new THREE.MeshBasicMaterial({ color: 0x63caff, side: THREE.DoubleSide });
    reticle = new THREE.Mesh(ringGeo, ringMat);
    reticle.visible = false;
    scene.add(reticle);
  }
 
  // ── Загрузка модели ─────────────────────────────────────────────────────────
  function loadModel(callback) {
    const loader = new GLTFLoader();
    loader.load(
      MODEL_URL,
      (gltf) => {
        model = gltf.scene;
 
        // Анимация
        if (gltf.animations && gltf.animations.length) {
          mixer = new THREE.AnimationMixer(model);
          gltf.animations.forEach(clip => mixer.clipAction(clip).play());
        }
 
        // Прозрачность для искусственного пола
        // Модель уже содержит прозрачный меш — убедимся что Three.js его читает
        model.traverse(child => {
          if (child.isMesh) {
            child.castShadow = false;
            // Если материал имеет alphaTest или прозрачность — сохраняем
            if (child.material) {
              const mats = Array.isArray(child.material) ? child.material : [child.material];
              mats.forEach(mat => {
                if (mat.transparent || mat.opacity < 1) {
                  mat.transparent = true;
                  mat.depthWrite = false; // важно для корректной прозрачности
                  mat.side = THREE.DoubleSide;
                }
              });
            }
          }
        });
 
        model.visible = false;
        scene.add(model);
        if (callback) callback();
      },
      undefined,
      (err) => {
        console.error('Ошибка загрузки модели:', err);
        errorMsg.style.display = 'block';
        errorMsg.textContent = 'Не удалось загрузить model.glb. Проверь путь к файлу.';
      }
    );
  }
 
  // ── WebXR сессия ────────────────────────────────────────────────────────────
  async function startARSession() {
    try {
      xrSession = await navigator.xr.requestSession('immersive-ar', {
        requiredFeatures: ['hit-test'],
        optionalFeatures: ['dom-overlay', 'light-estimation'],
        domOverlay: { root: document.body }
      });
 
      renderer.xr.setReferenceSpaceType('local');
      await renderer.xr.setSession(xrSession);
 
      xrSession.addEventListener('end', onSessionEnd);
 
      overlay.classList.add('hidden');
      uiOverlay.classList.add('visible');
 
      // Загружаем модель после старта сессии
      loadModel();
 
      // Hit-test source
      const viewerSpace = await xrSession.requestReferenceSpace('viewer');
      localSpace = await xrSession.requestReferenceSpace('local');
      hitTestSource = await xrSession.requestHitTestSource({ space: viewerSpace });
 
      // Тап — размещение модели
      xrSession.addEventListener('select', onSelect);
 
      renderer.setAnimationLoop(onXRFrame);
 
    } catch (e) {
      console.error('Ошибка AR сессии:', e);
      errorMsg.style.display = 'block';
      errorMsg.textContent = 'Не удалось запустить AR: ' + e.message;
    }
  }
 
  // ── Тап: разместить модель ──────────────────────────────────────────────────
  function onSelect() {
    if (!reticle.visible || !model) return;
    model.position.setFromMatrixPosition(reticle.matrix);
    model.visible = true;
    modelPlaced = true;
    hintText.textContent = 'Ходи вокруг модели!';
    reticle.visible = false;
  }
 
  // ── Рендер цикл ─────────────────────────────────────────────────────────────
  function onXRFrame(timestamp, frame) {
    if (!frame) return;
    const delta = clock.getDelta();
 
    // Анимации
    if (mixer) mixer.update(delta);
 
    // Hit-test
    if (hitTestSource && !modelPlaced) {
      const hitTestResults = frame.getHitTestResults(hitTestSource);
      if (hitTestResults.length > 0) {
        const hit = hitTestResults[0];
        const pose = hit.getPose(localSpace);
        if (pose) {
          reticle.visible = true;
          reticle.matrix.fromArray(pose.transform.matrix);
        }
      } else {
        reticle.visible = false;
      }
    }
 
    renderer.render(scene, camera);
  }
 
  // ── Выход из AR ─────────────────────────────────────────────────────────────
  function onSessionEnd() {
    hitTestSource?.cancel();
    hitTestSource = null;
    xrSession = null;
    modelPlaced = false;
    uiOverlay.classList.remove('visible');
    overlay.classList.remove('hidden');
    // Убираем canvas
    if (renderer) {
      renderer.domElement.remove();
      renderer.dispose();
      renderer = null;
    }
    scene = null;
    model = null;
    mixer = null;
  }
 
  document.getElementById('exit-btn').addEventListener('click', () => {
    xrSession?.end();
  });
 
  // ── Ресайз ──────────────────────────────────────────────────────────────────
  window.addEventListener('resize', () => {
    if (!renderer) return;
    camera.aspect = window.innerWidth / window.innerHeight;
    camera.updateProjectionMatrix();
    renderer.setSize(window.innerWidth, window.innerHeight);
  });
</script>
</body>
</html>
