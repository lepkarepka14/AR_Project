<!-- index.html -->
<script type="module" src="https://unpkg.com/@google/model-viewer/dist/model-viewer.min.js"></script>

<model-viewer id="mv"
  src="model.glb"
  ios-src="model.usdz"
  ar
  ar-modes="webxr scene-viewer quick-look"
  environment-image="neutral"
  camera-controls
  autoplay
  style="width:100%;height:100vh;">
</model-viewer>

<script>
  const mv = document.getElementById('mv');
  // смещение модели вниз, чтобы её анимация "вылазила" из-под пола
  mv.addEventListener('load', () => {
    const scene = mv.model; // THREE-like scene proxy
    if (scene) {
      scene.scene.position.y = -0.2; // смещение в метрах, подберите под модель
    }
  });
</script>
