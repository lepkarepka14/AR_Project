<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AR Animated Models Showcase</title>
    <style>
        body { 
            margin: 0; 
            overflow: hidden; 
            background-color: #000;
        }
        #info {
            position: absolute;
            top: 10px;
            width: 100%;
            text-align: center;
            color: white;
            font-family: sans-serif;
            pointer-events: none;
            z-index: 100;
        }
    </style>
    <script async src="https://unpkg.com/es-module-shims@1.8.0/dist/es-module-shims.js"></script>
    
    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
                "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
            }
        }
    </script>
</head>
<body>
    <div id="info">Для AR потребуется телефон с поддержкой WebXR</div>
    
    <script type="module">
        import * as THREE from 'three';
        import { ARButton } from 'three/addons/webxr/ARButton.js';
        import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';

        let camera, scene, renderer;
        let mixers = [];
        const clock = new THREE.Clock();

        init();
        animate();

        function init() {
            const container = document.createElement('div');
            document.body.appendChild(container);

            scene = new THREE.Scene();

            camera = new THREE.PerspectiveCamera(70, window.innerWidth / window.innerHeight, 0.01, 20);

            // Освещение, чтобы модели не были черными
            const light = new THREE.HemisphereLight(0xffffff, 0xbbbbff, 2);
            light.position.set(0.5, 1, 0.25);
            scene.add(light);
            
            const directionalLight = new THREE.DirectionalLight(0xffffff, 1);
            directionalLight.position.set(1, 4, 2);
            scene.add(directionalLight);

            // Настройка рендера (alpha: true обязателен для AR, чтобы видеть камеру)
            renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
            renderer.setPixelRatio(window.devicePixelRatio);
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.xr.enabled = true; // Включаем поддержку WebXR
            container.appendChild(renderer.domElement);

            // Добавляем кнопку "START AR"
            document.body.appendChild(ARButton.createButton(renderer, { requiredFeatures: ['hit-test'] }));

            const loader = new GLTFLoader();
            const models = ['Turtle.glb', 'Whale.glb', 'Iguana.glb'];

            models.forEach(modelFile => {
                loader.load(modelFile, function (gltf) {
                    const model = gltf.scene;

                    // --- Рандомизация позиции ---
                    // X (по горизонтали): от -2 до +2 метров
                    const randomX = (Math.random() - 0.5) * 4;
                    // Z (в глубину от пользователя): от -1.5 до -4 метров (чтобы они сразу были в поле зрения)
                    const randomZ = - (Math.random() * 2.5 + 1.5);
                    // Y (высота): 0 (на уровне устройства/пола), можно изменить по необходимости
                    const randomY = (Math.random() - 0.5) * 1; 

                    model.position.set(randomX, randomY, randomZ);

                    // Добавим немного случайного вращения по оси Y для естественности
                    model.rotation.y = Math.random() * Math.PI * 2;

                    scene.add(model);

                    // --- Настройка анимации ---
                    if (gltf.animations && gltf.animations.length > 0) {
                        const mixer = new THREE.AnimationMixer(model);
                        gltf.animations.forEach((clip) => {
                            mixer.clipAction(clip).play();
                        });
                        mixers.push(mixer);
                    }
                }, undefined, function (error) {
                    console.error('Ошибка загрузки модели: ' + modelFile, error);
                });
            });

            window.addEventListener('resize', onWindowResize);
        }

        function onWindowResize() {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        }

        function animate() {
            renderer.setAnimationLoop(render);
        }

        function render() {
            const delta = clock.getDelta();
            // Обновляем все анимации
            mixers.forEach(mixer => mixer.update(delta));
            renderer.render(scene, camera);
        }
    </script>
</body>
</html>
