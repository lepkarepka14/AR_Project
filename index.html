<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AR Reliable Floor Placement</title>
    <style>
        body { 
            margin: 0; 
            overflow: hidden; 
            background-color: #000;
            font-family: sans-serif;
        }
        #info {
            position: absolute;
            top: 20px;
            width: 100%;
            text-align: center;
            color: white;
            pointer-events: none;
            z-index: 100;
            font-size: 16px;
            text-shadow: 0px 1px 4px rgba(0,0,0,0.8);
        }
    </style>
    <script async src="https://unpkg.com/es-module-shims@1.8.0/dist/es-module-shims.js"></script>
    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
                "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
            }
        }
    </script>
</head>
<body>
    <div id="info">Нажмите START AR, затем плавно поводите камерой по полу</div>
    
    <script type="module">
        import * as THREE from 'three';
        import { ARButton } from 'three/addons/webxr/ARButton.js';
        import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';

        let camera, scene, renderer;
        let mixers = [];
        const clock = new THREE.Clock();

        // Главный контейнер для всех моделей. Он встанет ровно на найденный пол.
        let baseGroup; 
        let floorFound = false;
        let hitTestSource = null;
        let hitTestSourceRequested = false;

        // Настройки безопасности расстояний (в метрах)
        const MIN_DISTANCE = 4.5; // Минимальное расстояние между объектами 
        const TARGET_MODEL_SIZE = 1.2; // Принудительный размер моделей (ось максимума), чтобы исключить гигантские исходники
        const placedPositions = [];

        init();
        animate();

        function init() {
            const container = document.createElement('div');
            document.body.appendChild(container);

            scene = new THREE.Scene();
            camera = new THREE.PerspectiveCamera(70, window.innerWidth / window.innerHeight, 0.01, 25);

            // Мягкий свет
            const light = new THREE.HemisphereLight(0xffffff, 0xbbbbff, 3);
            light.position.set(0.5, 1, 0.25);
            scene.add(light);
            
            const directionalLight = new THREE.DirectionalLight(0xffffff, 2);
            directionalLight.position.set(2, 5, 3);
            scene.add(directionalLight);

            // Создаем базовую группу (изначально скрыта, пока не найдем пол)
            baseGroup = new THREE.Group();
            baseGroup.visible = false;
            scene.add(baseGroup);

            renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
            renderer.setPixelRatio(window.devicePixelRatio);
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.xr.enabled = true;
            container.appendChild(renderer.domElement);

            // Запрашиваем hit-test для аппаратного сканирования поверхностей пола
            document.body.appendChild(ARButton.createButton(renderer, { 
                requiredFeatures: ['hit-test'] 
            }));

            const loader = new GLTFLoader();
            const models = ['Turtle.glb', 'Whale.glb', 'Iguana.glb'];

            models.forEach(modelFile => {
                loader.load(modelFile, function (gltf) {
                    const model = gltf.scene;

                    // 1. ЗАЩИТА ОТ ПЕРЕКРЫТИЯ: Считаем реальный размер и нормализуем масштаб
                    const box = new THREE.Box3().setFromObject(model);
                    const size = box.getSize(new THREE.Vector3());
                    const maxDimension = Math.max(size.x, size.y, size.z);
                    
                    // Если модель в исходнике огромная или крошечная, приводим её к контролируемому размеру
                    if (maxDimension > 0) {
                        const scaleFactor = TARGET_MODEL_SIZE / maxDimension;
                        model.scale.set(scaleFactor, scaleFactor, scaleFactor);
                    }

                    // 2. Генерируем уникальные координаты со строгой дистанцией друг от друга
                    const coords = generateSafePosition();
                    model.position.set(coords.x, 0, coords.z);
                    model.rotation.y = Math.random() * Math.PI * 2;

                    // Добавляем модель в базовую группу
                    baseGroup.add(model);

                    // Анимация
                    if (gltf.animations && gltf.animations.length > 0) {
                        const mixer = new THREE.AnimationMixer(model);
                        gltf.animations.forEach((clip) => {
                            mixer.clipAction(clip).play();
                        });
                        mixers.push(mixer);
                    }
                }, undefined, function (e) {
                    console.error('Ошибка загрузки:', modelFile, e);
                });
            });

            window.addEventListener('resize', onWindowResize);
        }

        // Алгоритм жесткого разделения позиций в пространстве 12х12 метров
        function generateSafePosition() {
            let x, z;
            let isValid = false;
            let attempts = 0;

            while (!isValid && attempts < 1000) {
                // Разброс координат относительно центральной точки пола
                x = (Math.random() - 0.5) * 12; 
                z = (Math.random() - 0.5) * 12; 

                isValid = true;

                for (let i = 0; i < placedPositions.length; i++) {
                    const other = placedPositions[i];
                    const distance = Math.sqrt(Math.pow(x - other.x, 2) + Math.pow(z - other.z, 2));

                    if (distance < MIN_DISTANCE) {
                        isValid = false; 
                        break;
                    }
                }
                attempts++;
            }

            const finalPos = { x: x, z: z };
            placedPositions.push(finalPos);
            return finalPos;
        }

        function onWindowResize() {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        }

        function animate() {
            renderer.setAnimationLoop(render);
        }

        function render(timestamp, frame) {
            const delta = clock.getDelta();
            mixers.forEach(mixer => mixer.update(delta));

            // Логика сканирования и поиска пола в реальном времени
            if (frame && !floorFound) {
                const referenceSpace = renderer.xr.getReferenceSpace();
                const session = renderer.xr.getSession();

                if (hitTestSourceRequested === false) {
                    session.requestReferenceSpace('viewer').then(function (viewerSpace) {
                        session.requestHitTestSource({ space: viewerSpace }).then(function (source) {
                            hitTestSource = source;
                        });
                    });
                    hitTestSourceRequested = true;
                }

                if (hitTestSource) {
                    const hitTestResults = frame.getHitTestResults(hitTestSource);
                    
                    // Если ARCore/ARKit нашел устойчивую горизонтальную плоскость (пол):
                    if (hitTestResults.length > 0) {
                        const hit = hitTestResults[0];
                        const pose = hit.getPose(referenceSpace);

                        // Перемещаем всю группу моделей ровно на физическую поверхность земли
                        baseGroup.position.fromArray(pose.transform.position);
                        
                        // Показываем сцену пользователю
                        baseGroup.visible = true; 
                        floorFound = true; // Выключаем сканирование, жестко закрепив координаты в комнате

                        document.getElementById('info').innerText = "Пол успешно определен! Модели расставлены.";
                        setTimeout(() => {
                            document.getElementById('info').style.display = 'none';
                        }, 3000);
                    }
                }
            }

            renderer.render(scene, camera);
        }
    </script>
</body>
</html>
