<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AR Tap to Place</title>
    <style>
        body { 
            margin: 0; 
            overflow: hidden; 
            background-color: #000;
            font-family: sans-serif;
        }
        #info {
            position: absolute;
            top: 20px;
            width: 100%;
            text-align: center;
            color: white;
            pointer-events: none;
            z-index: 100;
            font-size: 16px;
            text-shadow: 0px 1px 4px rgba(0,0,0,0.8);
        }
    </style>
    <script async src="https://unpkg.com/es-module-shims@1.8.0/dist/es-module-shims.js"></script>
    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
                "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
            }
        }
    </script>
</head>
<body>
    <div id="info">Нажмите START AR, наведите появившееся кольцо на пол и коснитесь экрана</div>
    
    <script type="module">
        import * as THREE from 'three';
        import { ARButton } from 'three/addons/webxr/ARButton.js';
        import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';

        let camera, scene, renderer;
        let mixers = [];
        const clock = new THREE.Clock();

        let baseGroup, reticle, controller;
        let hitTestSource = null;
        let hitTestSourceRequested = false;

        const MIN_DISTANCE = 4.5; 
        const TARGET_MODEL_SIZE = 1.2; 
        const placedPositions = [];

        init();
        animate();

        function init() {
            const container = document.createElement('div');
            document.body.appendChild(container);

            scene = new THREE.Scene();
            camera = new THREE.PerspectiveCamera(70, window.innerWidth / window.innerHeight, 0.01, 25);

            const light = new THREE.HemisphereLight(0xffffff, 0xbbbbff, 3);
            light.position.set(0.5, 1, 0.25);
            scene.add(light);
            
            const directionalLight = new THREE.DirectionalLight(0xffffff, 2);
            directionalLight.position.set(2, 5, 3);
            scene.add(directionalLight);

            // Базовая группа для моделей (скрыта до тапа по экрану)
            baseGroup = new THREE.Group();
            baseGroup.visible = false;
            scene.add(baseGroup);

            renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
            renderer.setPixelRatio(window.devicePixelRatio);
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.xr.enabled = true;
            container.appendChild(renderer.domElement);

            document.body.appendChild(ARButton.createButton(renderer, { 
                requiredFeatures: ['hit-test'] 
            }));

            // --- Создаем прицел (Reticle) ---
            reticle = new THREE.Mesh(
                new THREE.RingGeometry(0.15, 0.2, 32).rotateX(-Math.PI / 2),
                new THREE.MeshBasicMaterial()
            );
            reticle.matrixAutoUpdate = false;
            reticle.visible = false;
            scene.add(reticle);

            // --- Настройка контроллера (Тап по экрану) ---
            controller = renderer.xr.getController(0);
            controller.addEventListener('select', onSelect);
            scene.add(controller);

            // Загрузка моделей
            const loader = new GLTFLoader();
            const models = ['Turtle.glb', 'Whale.glb', 'Iguana.glb'];

            models.forEach(modelFile => {
                loader.load(modelFile, function (gltf) {
                    const model = gltf.scene;

                    const box = new THREE.Box3().setFromObject(model);
                    const size = box.getSize(new THREE.Vector3());
                    const maxDimension = Math.max(size.x, size.y, size.z);
                    
                    if (maxDimension > 0) {
                        const scaleFactor = TARGET_MODEL_SIZE / maxDimension;
                        model.scale.set(scaleFactor, scaleFactor, scaleFactor);
                    }

                    const coords = generateSafePosition();
                    model.position.set(coords.x, 0, coords.z);
                    model.rotation.y = Math.random() * Math.PI * 2;

                    baseGroup.add(model);

                    if (gltf.animations && gltf.animations.length > 0) {
                        const mixer = new THREE.AnimationMixer(model);
                        gltf.animations.forEach((clip) => {
                            mixer.clipAction(clip).play();
                        });
                        mixers.push(mixer);
                    }
                }, undefined, function (e) {
                    console.error('Ошибка загрузки:', modelFile, e);
                });
            });

            window.addEventListener('resize', onWindowResize);
        }

        // Логика при тапе на экран
        function onSelect() {
            if (reticle.visible) {
                // Перемещаем группу с моделями в точку, где находится прицел
                baseGroup.position.setFromMatrixPosition(reticle.matrix);
                baseGroup.visible = true;
                
                document.getElementById('info').innerText = "Модели размещены! Вы можете тапнуть еще раз, чтобы переместить их.";
                setTimeout(() => {
                    const infoEl = document.getElementById('info');
                    if(infoEl) infoEl.style.display = 'none';
                }, 4000);
            }
        }

        function generateSafePosition() {
            let x, z;
            let isValid = false;
            let attempts = 0;

            while (!isValid && attempts < 1000) {
                x = (Math.random() - 0.5) * 12; 
                z = (Math.random() - 0.5) * 12; 

                isValid = true;

                for (let i = 0; i < placedPositions.length; i++) {
                    const other = placedPositions[i];
                    const distance = Math.sqrt(Math.pow(x - other.x, 2) + Math.pow(z - other.z, 2));

                    if (distance < MIN_DISTANCE) {
                        isValid = false; 
                        break;
                    }
                }
                attempts++;
            }

            const finalPos = { x: x, z: z };
            placedPositions.push(finalPos);
            return finalPos;
        }

        function onWindowResize() {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        }

        function animate() {
            renderer.setAnimationLoop(render);
        }

        function render(timestamp, frame) {
            const delta = clock.getDelta();
            mixers.forEach(mixer => mixer.update(delta));

            // Логика работы прицела (Reticle)
            if (frame) {
                const referenceSpace = renderer.xr.getReferenceSpace();
                const session = renderer.xr.getSession();

                if (hitTestSourceRequested === false) {
                    session.requestReferenceSpace('viewer').then(function (viewerSpace) {
                        session.requestHitTestSource({ space: viewerSpace }).then(function (source) {
                            hitTestSource = source;
                        });
                    });

                    // Очистка при выходе из AR
                    session.addEventListener('end', function () {
                        hitTestSourceRequested = false;
                        hitTestSource = null;
                        reticle.visible = false;
                        baseGroup.visible = false;
                        document.getElementById('info').style.display = 'block';
                        document.getElementById('info').innerText = "Нажмите START AR, наведите появившееся кольцо на пол и коснитесь экрана";
                    });

                    hitTestSourceRequested = true;
                }

                if (hitTestSource) {
                    const hitTestResults = frame.getHitTestResults(hitTestSource);
                    
                    if (hitTestResults.length > 0) {
                        const hit = hitTestResults[0];
                        // Показываем прицел и двигаем его по сетке пола
                        reticle.visible = true;
                        reticle.matrix.fromArray(hit.getPose(referenceSpace).transform.matrix);
                    } else {
                        // Прячем прицел, если камера потеряла пол из виду
                        reticle.visible = false;
                    }
                }
            }

            renderer.render(scene, camera);
        }
    </script>
</body>
</html>
