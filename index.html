<model-viewer 
  id="ar-model"
  src="model.glb" 
  ios-src="model.usdz" 
  ar 
  ar-modes="webxr scene-viewer quick-look" 
  camera-controls 
  shadow-intensity="1">
</model-viewer>

<script>
  const modelViewer = document.querySelector('#ar-model');

  // Событие срабатывает, когда пользователь вошел в AR-режим
  modelViewer.addEventListener('ar-status', (event) => {
    if (event.detail.status === 'session-started') {
      console.log("AR сессия началась, запускаем анимацию...");
      
      // Запускаем анимацию
      modelViewer.play(); 
      
      // Если нужно проиграть только один раз:
      // modelViewer.setAttribute('autoplay', 'false'); // Важно выключить зацикливание, если нужно
    }
  });
</script>
